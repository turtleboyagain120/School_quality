name: School_Quality_Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  run-sync-protocol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Studio Protocol
        run: python main.py
